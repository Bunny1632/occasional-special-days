<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What's Special Today</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800&family=Special+Elite&family=Inter:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F2622;
    --ink-2:#13302B;
    --paper:#F4ECDA;
    --paper-shade:#E8DBB8;
    --stamp-red:#9C3A2E;
    --mustard:#D9A441;
    --moss:#4F8A73;
    --saffron:#D97A33;
    --slate:#9FB0AA;
    --cream:#F4ECDA;
    --line: rgba(244,236,218,0.16);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 120% 80% at 50% -10%, rgba(79,138,115,0.18), transparent 60%),
      linear-gradient(180deg, var(--ink-2), var(--ink) 60%);
    color:var(--cream);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}
  .wrap{
    max-width:640px;
    margin:0 auto;
    padding:36px 20px 64px;
  }
  .eyebrow{
    font-family:'Special Elite',monospace;
    letter-spacing:0.28em;
    text-transform:uppercase;
    font-size:11.5px;
    color:var(--mustard);
    text-align:center;
    margin-bottom:22px;
  }

  /* ---- Postmark ---- */
  .postmark-stage{
    display:flex;
    justify-content:center;
    margin-bottom:8px;
  }
  .postmark{
    position:relative;
    width:236px;
    height:236px;
    transform:rotate(-6deg);
  }
  .postmark svg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
  }
  .postmark-ring{
    fill:none;
    stroke:var(--mustard);
    opacity:0.85;
  }
  .postmark-ring.outer{stroke-width:2.5;}
  .postmark-ring.inner{stroke-width:1.4; stroke-dasharray:3 4;}
  .postmark-arc-text{
    font-family:'Special Elite',monospace;
    font-size:11.5px;
    letter-spacing:0.16em;
    fill:var(--mustard);
  }
  .postmark-center{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
  }
  .postmark-day{
    font-family:'Big Shoulders Display',sans-serif;
    font-weight:800;
    font-size:84px;
    line-height:0.85;
    color:var(--cream);
  }
  .postmark-month{
    font-family:'Special Elite',monospace;
    font-size:13px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--mustard);
    margin-top:2px;
  }
  .postmark-grain{
    position:absolute;
    inset:0;
    border-radius:50%;
    background-image:radial-gradient(rgba(217,164,65,0.5) 0.6px, transparent 0.7px);
    background-size:7px 7px;
    mix-blend-mode:overlay;
    opacity:0.5;
    pointer-events:none;
  }

  /* ---- Day-of-year strip ---- */
  .strip{
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
    font-family:'Special Elite',monospace;
    font-size:11.5px;
    color:var(--slate);
    letter-spacing:0.04em;
    margin:22px 0 30px;
    text-align:center;
  }
  .strip b{color:var(--cream); font-weight:400;}

  /* ---- Controls ---- */
  .controls{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .btn{
    appearance:none;
    border:1px solid var(--line);
    background:rgba(244,236,218,0.04);
    color:var(--cream);
    font-family:'Inter',sans-serif;
    font-size:14px;
    padding:9px 14px;
    border-radius:7px;
    cursor:pointer;
    transition:background .15s ease, transform .1s ease;
  }
  .btn:hover{background:rgba(244,236,218,0.1);}
  .btn:active{transform:scale(0.97);}
  .btn:focus-visible{outline:2px solid var(--mustard); outline-offset:2px;}
  .btn-icon{font-family:'Inter',sans-serif; font-size:16px; padding:9px 13px;}
  #dateInput{
    appearance:none;
    border:1px solid var(--line);
    background:rgba(244,236,218,0.04);
    color:var(--cream);
    font-family:'Inter',sans-serif;
    font-size:14px;
    padding:8px 10px;
    border-radius:7px;
    color-scheme: dark;
  }
  #dateInput:focus-visible{outline:2px solid var(--mustard); outline-offset:2px;}
  #todayBtn{
    background:var(--mustard);
    color:#241804;
    border-color:transparent;
    font-weight:600;
    display:none;
  }
  #todayBtn:hover{background:#e3b35c;}

  /* ---- Filter chips ---- */
  .chips{
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:30px;
  }
  .chip{
    appearance:none;
    border:1px solid var(--line);
    background:transparent;
    color:var(--slate);
    font-size:12.5px;
    letter-spacing:0.02em;
    padding:6px 12px;
    border-radius:100px;
    cursor:pointer;
    font-family:'Inter',sans-serif;
    transition:all .15s ease;
  }
  .chip:focus-visible{outline:2px solid var(--mustard); outline-offset:2px;}
  .chip[data-active="true"]{color:var(--ink); font-weight:600;}
  .chip[data-cat="UN"][data-active="true"]{background:var(--moss); border-color:var(--moss); color:#0c1f17;}
  .chip[data-cat="IN"][data-active="true"]{background:var(--saffron); border-color:var(--saffron); color:#26150a;}
  .chip[data-cat="CU"][data-active="true"]{background:var(--stamp-red); border-color:var(--stamp-red); color:var(--paper);}
  .chip[data-cat="FU"][data-active="true"]{background:var(--mustard); border-color:var(--mustard); color:#241804;}
  .chip[data-cat="ALL"][data-active="true"]{background:var(--cream); border-color:var(--cream); color:var(--ink);}

  /* ---- Cards ---- */
  .cards{display:flex; flex-direction:column; gap:14px;}
  .card{
    position:relative;
    background:var(--paper);
    color:#2A2014;
    border-radius:10px;
    padding:20px 20px 18px;
    box-shadow:0 10px 24px rgba(0,0,0,0.28);
  }
  .card::before{
    content:"";
    position:absolute;
    top:0; left:18px; right:18px;
    height:1px;
    background-image:radial-gradient(circle, var(--ink) 1.6px, transparent 1.7px);
    background-size:11px 1px;
    background-repeat:repeat-x;
    transform:translateY(-1px);
  }
  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
  }
  .card-name{
    font-family:'Big Shoulders Display',sans-serif;
    font-weight:700;
    font-size:22px;
    line-height:1.15;
  }
  .tag{
    flex-shrink:0;
    font-family:'Special Elite',monospace;
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:4px 9px;
    border-radius:100px;
    color:var(--paper);
    margin-top:3px;
  }
  .tag.UN{background:var(--moss); color:#eafff5;}
  .tag.IN{background:var(--saffron);}
  .tag.CU{background:var(--stamp-red);}
  .tag.FU{background:var(--mustard); color:#241804;}
  .card-desc{
    margin-top:8px;
    font-size:14px;
    line-height:1.5;
    color:#4A3F2C;
  }
  .empty-card{
    background:rgba(244,236,218,0.05);
    border:1px dashed var(--line);
    border-radius:10px;
    padding:26px 20px;
    text-align:center;
    color:var(--slate);
    font-size:14.5px;
    line-height:1.6;
  }
  .empty-card b{color:var(--cream);}

  footer{
    margin-top:40px;
    text-align:center;
    font-size:12px;
    color:var(--slate);
    line-height:1.7;
  }
  footer span{display:block;}

  @media (max-width:420px){
    .postmark{width:200px; height:200px;}
    .postmark-day{font-size:70px;}
  }
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>

  <div class="controls">
    <button class="btn btn-icon" id="prevBtn" aria-label="Previous day">‹</button>
    <input type="date" id="dateInput" aria-label="Jump to date">
    <button class="btn btn-icon" id="nextBtn" aria-label="Next day">›</button>
    <button class="btn" id="todayBtn">Today</button>
  </div>

  <div class="chips" id="chips">
    <button class="chip" data-cat="ALL" data-active="true">All</button>

  <div class="cards" id="cards"></div>

  <footer>
    <span id="coverageNote">Curated from UN observance lists, national calendars and well-known cultural days.</span>
    <span>Don't see a day you know? Ask Claude to add it to the almanac.</span>
  </footer>

</div>

const FLOATING_DAYS = [
  {month:1, weekday:1, nth:3, n:"Martin Luther King Jr. Day", c:"CU", d:"US federal holiday honouring the civil-rights leader."},
  {month:1, weekday:0, nth:3, n:"World Religion Day", c:"UN"},
  {month:5, weekday:0, nth:2, n:"Mother's Day", c:"CU"},
  {month:5, weekday:5, nth:1, n:"No Pants Day", c:"FU"},
  {month:5, weekday:4, nth:3, n:"Global Accessibility Awareness Day", c:"UN"},
  {month:6, weekday:0, nth:3, n:"Father's Day", c:"CU"},
  {month:7, weekday:6, nth:1, n:"International Day of Cooperatives", c:"UN"},
  {month:8, weekday:0, nth:1, n:"Friendship Day", c:"CU", d:"Widely observed in India and several other countries on the first Sunday of August."},
  {month:9, weekday:4, nth:-1, n:"World Maritime Day", c:"UN"},
  {month:9, weekday:6, nth:3, n:"World Cleanup Day", c:"UN"},

  {month:10, weekday:6, nth:3, n:"Sweetest Day", c:"FU"},
  {month:11, weekday:4, nth:3, n:"World Philosophy Day", c:"UN"},
  {month:11, weekday:0, nth:3, n:"World Day of Remembrance for Road Traffic Victims", c:"UN"},
  {month:11, weekday:4, nth:4, n:"Thanksgiving Day (US)", c:"CU"}
];

// ============== APP LOGIC ==============
const pad = n => String(n).padStart(2,'0');
const MONTHS = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const MONTHS_FULL = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const WEEKDAYS_FULL = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

let current = startOfDay(new Date());
let activeCats = new Set(["UN","IN","CU","FU"]);

function startOfDay(d){
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}
function keyFor(date){
  return pad(date.getMonth()+1) + "-" + pad(date.getDate());
}
function isSameDay(a,b){
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
function nthWeekdayOfMonth(year, monthIndex, weekday, nth){
  // monthIndex: 0-11
  if(nth > 0){
    const first = new Date(year, monthIndex, 1);
    const offset = (weekday - first.getDay() + 7) % 7;
    return new Date(year, monthIndex, 1 + offset + (nth-1)*7);
  } else {
    const lastDay = new Date(year, monthIndex+1, 0);
    const offset = (lastDay.getDay() - weekday + 7) % 7;
    return new Date(year, monthIndex+1, 0 - offset);
  }
}
function getFloatingForDate(date){
  const out = [];
  FLOATING_DAYS.forEach(rule => {
    const monthIndex = rule.month - 1;
    if(date.getMonth() !== monthIndex) return;
    const computed = nthWeekdayOfMonth(date.getFullYear(), monthIndex, rule.weekday, rule.nth);
    if(isSameDay(computed, date)){
      out.push({n:rule.n, c:rule.c, d:rule.d});
    }
  });
  return out;
}
function getEntriesForDate(date){
  const fixed = FIXED_DAYS[keyFor(date)] || [];
  const floating = getFloatingForDate(date);
  return fixed.concat(floating);
}
function dayOfYear(date){
  const start = new Date(date.getFullYear(), 0, 1);
  return Math.floor((date - start) / 86400000) + 1;
}
function isLeap(y){ return (y%4===0 && y%100!==0) || y%400===0; }

function render(){
  const entries = getEntriesForDate(current);
  const filtered = entries.filter(e => activeCats.has(e.c));

  // Postmark
  document.getElementById('dayNum').textContent = pad(current.getDate());
  document.getElementById('monthYear').textContent = MONTHS[current.getMonth()] + " " + current.getFullYear();
  document.getElementById('arcTopText').textContent = WEEKDAYS_FULL[current.getDay()].toUpperCase();
  document.getElementById('arcBottomText').textContent = isSameDay(current, startOfDay(new Date())) ? "TODAY'S SPECIAL" : "ON THIS DAY";

  // Strip
  const total = isLeap(current.getFullYear()) ? 366 : 365;
  const doy = dayOfYear(current);
  document.getElementById('yearStrip').innerHTML =
    'Day <b>' + doy + '</b> of <b>' + total + '</b> &nbsp;·&nbsp; <b>' + (total - doy) + '</b> days left in ' + current.getFullYear();

  // Date input + today button
  document.getElementById('dateInput').value = current.getFullYear() + '-' + pad(current.getMonth()+1) + '-' + pad(current.getDate());
  document.getElementById('todayBtn').style.display = isSameDay(current, startOfDay(new Date())) ? 'none' : 'inline-block';

  // Cards
  const cardsEl = document.getElementById('cards');
  cardsEl.innerHTML = '';
  if(entries.length === 0){
    cardsEl.innerHTML = '<div class="empty-card">No catalogued special found for <b>' + MONTHS_FULL[current.getMonth()] + ' ' + current.getDate() + '</b> yet. <br>Ask Claude to look one up and add it to the almanac.</div>';
  } else if(filtered.length === 0){
    cardsEl.innerHTML = '<div class="empty-card">There are specials today, but none match your current filter.</div>';
  } else {
    filtered.forEach(e => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML =
        '<div class="card-top"><div class="card-name">' + e.n + '</div>' +
        '<div class="tag ' + e.c + '">' + catLabel(e.c) + '</div></div>' +
        (e.d ? '<div class="card-desc">' + e.d + '</div>' : '');
      cardsEl.appendChild(card);
    });
  }
}
function catLabel(c){
  return {UN:"Intl", IN:"India", CU:"Cultural", FU:"Fun"}[c] || c;
}

// ---- events ----
document.getElementById('prevBtn').addEventListener('click', () => {
  current = new Date(current.getFullYear(), current.getMonth(), current.getDate()-1);
  render();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  current = new Date(current.getFullYear(), current.getMonth(), current.getDate()+1);
  render();
});
document.getElementById('todayBtn').addEventListener('click', () => {
  current = startOfDay(new Date());
  render();
});
document.getElementById('dateInput').addEventListener('change', (ev) => {
  const v = ev.target.value;
  if(!v) return;
  const [y,m,d] = v.split('-').map(Number);
  current = new Date(y, m-1, d);
  render();
});
document.getElementById('chips').addEventListener('click', (ev) => {
  const chip = ev.target.closest('.chip');
  if(!chip) return;
  const cat = chip.getAttribute('data-cat');
  if(cat === 'ALL'){
    activeCats = new Set(["UN","IN","CU","FU"]);
  } else {
    if(activeCats.has(cat) && activeCats.size === 1){
      // don't allow zero categories; treat as reset to all
      activeCats = new Set(["UN","IN","CU","FU"]);
    } else if(activeCats.has(cat)){
      activeCats.delete(cat);
    } else {
      activeCats.add(cat);
    }
  }
  document.querySelectorAll('.chip').forEach(c => {
    const cc = c.getAttribute('data-cat');
    const isAll = cc === 'ALL';
    c.setAttribute('data-active', isAll ? (activeCats.size===4 ? 'true':'false') : activeCats.has(cc));
  });
  render();
});

render();
</script>
